<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-OSIS SMAN 27 GARUT | Premium Management System</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a', // Navy
                        secondary: '#1e293b',
                        accent: '#eab308', // Gold
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(234, 179, 8, 0.3);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .gradient-text {
            background: linear-gradient(to right, #facc15, #fbbf24, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #eab308;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // --- FIREBASE CONFIGURATION ---
        // Ganti dengan config Firebase Anda sendiri untuk produksi
        const firebaseConfig = {
            apiKey: "AIzaSyB6ugxno0TTdna5t90EhP0JJaMD9yVHKTw", 
            authDomain: "e-osis.firebaseapp.com",
            projectId: "e-osis",
            storageBucket: "e-osis.firebasestorage.app",
            messagingSenderId: "813478799381",
            appId: "1:813478799381:web:6925cd277a1b36042f061c"
        };

        // Initialize Firebase
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        } catch (e) {
            console.error("Firebase init error", e);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- CONSTANTS ---
        const DIVISIONS = [
            "INTI/BPH", "KEIMANAN DAN KETAKWAAN", "BUDI PEKERTI/AKHLAK MULIA", 
            "WAWASAN KEBANGSAAN DAN BELA NEGARA", "PRESTASI AKADEMIK", "DEMOKRASI/KEPEKAAN SOSIAL",
            "KREATIVITAS KETERAMPILAN DAN KEWIRAUSAHAAN", "JASMANI DAN KESEHATAN GIZI",
            "SASTRA DAN BUDAYA", "TEKNOLOGI INFORMASI DAN KOMUNIKASI", "PEMBINAAN KOMUNIKASI DALAM BAHASA INGGRIS"
        ];

        const CLASSES = ["X", "XI", "XII"];

        // --- ICONS COMPONENTS (Lucide wrappers) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = "";
                    const icon = lucide.createElement(lucide.icons[name]);
                    icon.setAttribute("width", size);
                    icon.setAttribute("height", size);
                    if (className) icon.setAttribute("class", className);
                    ref.current.appendChild(icon);
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        };

        // --- UI COMPONENTS ---

        // Toast Notification
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const colors = {
                success: "bg-green-500/90 border-green-400",
                error: "bg-red-500/90 border-red-400",
                info: "bg-blue-500/90 border-blue-400"
            };

            return (
                <div className={`fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg backdrop-blur-md border text-white flex items-center gap-3 animate-fade-in ${colors[type] || colors.info}`}>
                    <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-triangle' : 'info'} />
                    {message}
                </div>
            );
        };

        // Modal
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="glass-panel w-full max-w-lg rounded-xl p-6 relative animate-slide-up">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white">
                            <Icon name="x" />
                        </button>
                        <h3 className="text-xl font-bold mb-4 text-accent">{title}</h3>
                        {children}
                    </div>
                </div>
            );
        };

        // QR Code Display
        const QRCodeDisplay = ({ text, size = 150 }) => {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && text) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, {
                        text: text,
                        width: size,
                        height: size,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [text, size]);
            return <div ref={qrRef} className="flex justify-center p-2 bg-white rounded-lg" />;
        };

        // --- CONTEXT & STATE MANAGEMENT ---

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('home'); // home, login, register, dashboard, admin
            const [toast, setToast] = useState(null);

            // Initialize Seed Data if Empty
            const seedData = async () => {
                const announcementsSnap = await db.collection('announcements').limit(1).get();
                if (announcementsSnap.empty) {
                    await db.collection('announcements').add({
                        title: "Selamat Datang di E-OSIS SMAN 27 GARUT",
                        content: "Platform manajemen organisasi modern. Silakan login untuk mengakses fitur.",
                        date: new Date().toISOString(),
                        author: "System"
                    });
                    await db.collection('events').add({
                        title: "Rapat Pleno OSIS",
                        description: "Wajib hadir seluruh pengurus inti.",
                        date: new Date(Date.now() + 86400000).toISOString(),
                        location: "Aula Utama"
                    });
                }
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (authUser) => {
                    if (authUser) {
                        // Check role
                        const userDoc = await db.collection('users').doc(authUser.uid).get();
                        if (userDoc.exists) {
                            const data = userDoc.data();
                            setUserData({ uid: authUser.uid, ...data, email: authUser.email });
                            setUser(authUser);
                            // Redirect logic
                            setView(data.role === 'admin' ? 'admin_dashboard' : 'user_dashboard');
                        } else {
                            // User exists in Auth but not DB (shouldn't happen with register flow)
                            setUser(authUser);
                            setUserData({ role: 'member' }); // fallback
                        }
                    } else {
                        setUser(null);
                        setUserData(null);
                        setView('home');
                    }
                    setLoading(false);
                    if(!authUser) seedData(); // Seed public data
                });

                return () => unsubscribe();
            }, []);

            const showToast = (msg, type = 'info') => setToast({ message: msg, type });

            const logout = async () => {
                await auth.signOut();
                setView('home');
                showToast("Berhasil logout", "success");
            };

            return (
                <AppContext.Provider value={{ user, userData, loading, view, setView, showToast, logout, toast }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // --- PAGES & COMPONENTS ---

        const Navigation = () => {
            const { user, userData, view, setView, logout } = useContext(AppContext);
            
            return (
                <nav className="fixed w-full z-40 glass-panel border-b border-white/10">
                    <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-gradient-to-br from-yellow-400 to-yellow-600 p-2 rounded-lg text-black">
                                <Icon name="school" size={28} />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-wide">E-OSIS <span className="text-yellow-500">SMAN 27</span></h1>
                                <p className="text-xs text-gray-400 uppercase tracking-widest">Garut</p>
                            </div>
                        </div>

                        <div className="hidden md:flex items-center gap-8">
                            <button onClick={() => setView('home')} className={`text-sm font-medium hover:text-yellow-400 transition ${view === 'home' ? 'text-yellow-400' : 'text-gray-300'}`}>Beranda</button>
                            <button onClick={() => setView('home')/* Scroll to section */} className="text-sm font-medium text-gray-300 hover:text-yellow-400 transition">Tentang</button>
                            <button onClick={() => setView('home')/* Scroll to section */} className="text-sm font-medium text-gray-300 hover:text-yellow-400 transition">Event</button>
                        </div>

                        <div className="flex items-center gap-4">
                            {user ? (
                                <div className="flex items-center gap-4">
                                    <span className="hidden md:block text-sm text-gray-300">
                                        Hi, <span className="font-bold text-white">{userData?.name}</span>
                                    </span>
                                    <button 
                                        onClick={() => setView(userData?.role === 'admin' ? 'admin_dashboard' : 'user_dashboard')}
                                        className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm transition flex items-center gap-2"
                                    >
                                        <Icon name="layout-dashboard" size={16} /> Dashboard
                                    </button>
                                </div>
                            ) : (
                                <button 
                                    onClick={() => setView('login')}
                                    className="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-bold px-6 py-2 rounded-lg text-sm transition shadow-lg shadow-yellow-500/20"
                                >
                                    Login
                                </button>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        const LandingPage = () => {
            const { setView } = useContext(AppContext);

            return (
                <div className="min-h-screen pt-20">
                    {/* Hero Section */}
                    <section className="container mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-12">
                        <div className="flex-1 space-y-6 animate-slide-up">
                            <div className="inline-block px-3 py-1 rounded-full border border-yellow-500/30 bg-yellow-500/10 text-yellow-400 text-xs font-bold tracking-wider mb-2">
                                SMAN 27 GARUT • PREMIUM OSIS SYSTEM
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold leading-tight">
                                Modernisasi <br/>
                                <span className="gradient-text">Organisasi</span> Sekolah
                            </h1>
                            <p className="text-gray-400 text-lg max-w-lg leading-relaxed">
                                Platform manajemen OSIS terintegrasi, futuristik, dan responsif. Tingkatkan efisiensi kerja, absensi digital, dan manajemen event dalam satu aplikasi.
                            </p>
                            <div className="flex flex-wrap gap-4 pt-4">
                                <button onClick={() => setView('register')} className="bg-yellow-500 text-black px-8 py-3 rounded-lg font-bold hover:bg-yellow-400 transition shadow-lg shadow-yellow-500/20 flex items-center gap-2">
                                    Gabung Sekarang <Icon name="arrow-right" size={18} />
                                </button>
                                <button className="glass-panel px-8 py-3 rounded-lg font-bold hover:bg-white/10 transition border border-white/20 flex items-center gap-2">
                                    Pelajari Fitur
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 relative animate-fade-in">
                            <div className="relative z-10 glass-panel rounded-2xl p-2 rotate-3 hover:rotate-0 transition duration-500">
                                <img src="https://picsum.photos/seed/sman27/600/400" alt="Dashboard Preview" className="rounded-xl border border-white/10" />
                            </div>
                            <div className="absolute inset-0 bg-gradient-to-tr from-yellow-500/20 to-purple-500/20 blur-3xl -z-10 rounded-full"></div>
                        </div>
                    </section>

                    {/* Features */}
                    <section className="container mx-auto px-6 py-20">
                        <h2 className="text-3xl font-bold text-center mb-16">Fitur <span className="gradient-text">Unggulan</span></h2>
                        <div className="grid md:grid-cols-3 gap-8">
                            {[
                                { title: "Realtime Dashboard", icon: "activity", desc: "Pantau statistik kehadiran dan event organisasi secara langsung tanpa refresh." },
                                { title: "Smart Attendance", icon: "scan-line", desc: "Sistem absensi berbasis QR Code yang cepat dan akurat." },
                                { title: "Digital Ticketing", icon: "ticket", desc: "Tiket event digital dengan keamanan token unik untuk setiap peserta." }
                            ].map((f, i) => (
                                <div key={i} className="glass-card p-8 rounded-2xl">
                                    <div className="w-12 h-12 bg-yellow-500/20 rounded-lg flex items-center justify-center text-yellow-500 mb-6">
                                        <Icon name={f.icon} />
                                    </div>
                                    <h3 className="text-xl font-bold mb-3">{f.title}</h3>
                                    <p className="text-gray-400 leading-relaxed">{f.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="border-t border-white/10 mt-20 py-8 bg-black/40 text-center text-gray-500 text-sm">
                        <p>&copy; 2025 E-OSIS SMAN 27 GARUT. All rights reserved.</p>
                    </footer
                      </div>
            );
        };

        const AuthPage = ({ mode }) => { // mode: login or register
            const { setView, showToast } = useContext(AppContext);
            const [formData, setFormData] = useState({
                name: '', email: '', password: '', class: '', division: '', whatsapp: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                try {
                    if (mode === 'register') {
                        if (formData.password.length < 6) throw new Error("Password minimal 6 karakter");
                        
                        const cred = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
                        await db.collection('users').doc(cred.user.uid).set({
                            name: formData.name,
                            email: formData.email,
                            class: formData.class,
                            division: formData.division,
                            whatsapp: formData.whatsapp,
                            role: 'member', // Default role
                            joinedAt: new Date().toISOString(),
                            photoURL: `https://ui-avatars.com/api/?name=${formData.name}&background=random`
                        });
                        showToast("Registrasi berhasil! Selamat datang.", "success");
                    } else {
                        // Login
                        await auth.signInWithEmailAndPassword(formData.email, formData.password);
                        showToast("Login berhasil", "success");
                    }
                    // View transition handled by AuthObserver
                } catch (error) {
                    console.error(error);
                    showToast(error.message, "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
              <div className="min-h-screen flex items-center justify-center pt-20 px-4">
                    <div className="glass-panel w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 to-yellow-600"></div>
                        
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-bold mb-2">{mode === 'login' ? 'Login' : 'Registrasi Anggota'}</h2>
                            <p className="text-gray-400 text-sm">Masuk untuk mengakses dashboard E-OSIS</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {mode === 'register' && (
                                <>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase mb-1">Nama Lengkap</label>
                                        <input required type="text" className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" placeholder="Nama Lengkap" onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase mb-1">Kelas</label>
                                            <select required className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" onChange={e => setFormData({...formData, class: e.target.value})}>
                                                <option value="">Pilih Kelas</option>
                                                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase mb-1">No WA</label>
                                            <input required type="tel" className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" placeholder="08..." onChange={e => setFormData({...formData, whatsapp: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase mb-1">Divisi</label>
                                        <select required className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" onChange={e => setFormData({...formData, division: e.target.value})}>
                                            <option value="">Pilih Divisi</option>
                                            {DIVISIONS.map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                </>
                            )}
                            
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-1">Email</label>
                                <input required type="email" className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" placeholder="osis@sman27.sch.id" onChange={e => setFormData({...formData, email: e.target.value})} />
                            </div>
                            
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label>
                                <input required type="password" className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 focus:border-yellow-500 focus:outline-none transition text-white" placeholder="••••••••" onChange={e => setFormData({...formData, password: e.target.value})} />
                            </div>

                          <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-bold py-3 rounded-lg transition flex items-center justify-center gap-2">
                                {isSubmitting ? <div className="loader w-5 h-5 border-black/20 border-l-black"></div> : (mode === 'login' ? 'Masuk' : 'Daftar Sekarang')}
                            </button>
                        </form>

                        <div className="mt-6 text-center text-sm">
                            <p className="text-gray-400">
                                {mode === 'login' ? 'Belum punya akun? ' : 'Sudah punya akun? '}
                                <button onClick={() => setView(mode === 'login' ? 'register' : 'login')} className="text-yellow-500 font-bold hover:underline">
                                    {mode === 'login' ? 'Daftar disini' : 'Login disini'}
                                </button>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD COMPONENTS ---

        const Sidebar = ({ active, setActive, role, logout }) => {
            const menuItems = role === 'admin' 
                ? [
                    { id: 'overview', label: 'Dashboard', icon: 'layout-dashboard' },
                    { id: 'members', label: 'Kelola Member', icon: 'users' },
                    { id: 'events', label: 'Kelola Event', icon: 'calendar' },
                    { id: 'attendance', label: 'Absensi', icon: 'scan-line' },
                    { id: 'announcements', label: 'Pengumuman', icon: 'megaphone' },
                  ]
                : [
                    { id: 'overview', label: 'Dashboard', icon: 'layout-dashboard' },
                    { id: 'my_events', label: 'Event Saya', icon: 'ticket' },
                    { id: 'history', label: 'Riwayat Absensi', icon: 'history' },
                    { id: 'profile', label: 'Profil Saya', icon: 'user' },
                  ];

            return (
                <aside className="hidden md:flex flex-col w-64 glass-panel border-r border-white/10 h-[calc(100vh-80px)] sticky top-20">
                    <div className="p-6">
                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">Menu Utama</h3>
                        <nav className="space-y-1">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActive(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition ${
                                        active === item.id 
                                        ? 'bg-yellow-500/10 text-yellow-500 border border-yellow-500/20' 
                                        : 'text-gray-400 hover:bg-white/5 hover:text-white'
                                    }`}
                                >
                                  <Icon name={item.icon} size={18} />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>
                    <div className="mt-auto p-6 border-t border-white/10">
                        <button onClick={logout} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-red-400 hover:bg-red-500/10 transition">
                            <Icon name="log-out" size={18} />
                            Keluar
                        </button>
                    </div>
                </aside>
            );
        };

        // --- USER DASHBOARD VIEWS ---

        const UserDashboard = () => {
            const { userData, showToast } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('overview');
            const [events, setEvents] = useState([]);
            const [myTickets, setMyTickets] = useState([]);
            const [history, setHistory] = useState([]);
            const [modalData, setModalData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    setLoading(true);
                    // Fetch Events
                    const eventsSnap = await db.collection('events').orderBy('date', 'desc').get();
                    setEvents(eventsSnap.docs.map(d => ({id: d.id, ...d.data()})));

                    // Fetch My Tickets
                    const ticketsSnap = await db.collection('tickets').where('userId', '==', userData.uid).get();
                    setMyTickets(ticketsSnap.docs.map(d => ({id: d.id, ...d.data()})));

                    // Fetch Attendance History
                    const attSnap = await db.collection('attendance').where('userId', '==', userData.uid).orderBy('timestamp', 'desc').get();
                    setHistory(attSnap.docs.map(d => ({id: d.id, ...d.data()})));
                    
                    setLoading(false);
                };

                if(userData?.uid) fetchData();
            }, [userData]);

            const handleJoinEvent = async (event) => {
              const token = Math.random().toString(36).substr(2, 9).toUpperCase();
                const ticketId = `TKT-${Date.now()}`;
                
                await db.collection('tickets').add({
                    ticketId: ticketId,
                    eventId: event.id,
                    eventTitle: event.title,
                    userId: userData.uid,
                    userName: userData.name,
                    userClass: userData.class,
                    status: 'active',
                    token: token,
                    createdAt: new Date().toISOString()
                });

                showToast("Berhasil bergabung! Tiket dibuat.", "success");
                setModalData({ type: 'ticket', data: { ticketId, token, eventTitle: event.title } });
                
                // Refresh local state
                setMyTickets(prev => [...prev, { ticketId, eventId: event.id, eventTitle: event.title, status: 'active', token }]);
            };

            const handleAttendance = async () => {
                const today = new Date().toDateString();
                const alreadyPresent = history.some(h => new Date(h.timestamp?.toDate()).toDateString() === today);
                
                if(alreadyPresent) {
                    showToast("Anda sudah absen hari ini!", "error");
                    return;
                }

                await db.collection('attendance').add({
                    userId: userData.uid,
                    name: userData.name,
                    class: userData.class,
                    division: userData.division,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'Hadir'
                });

                showToast("Absensi berhasil dicatat!", "success");
                setHistory(prev => [...prev, { 
                    name: userData.name, class: userData.class, status: 'Hadir', timestamp: new Date() 
                }]);
            };

            const renderContent = () => {
                if (loading) return <div className="p-10 text-center"><div className="loader mx-auto"></div></div>;

                switch(activeTab) {
                    case 'overview':
                        return (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="glass-card p-6 rounded-xl">
                                        <p className="text-gray-400 text-sm">Status Hari Ini</p>
                                        <h3 className="text-2xl font-bold mt-2 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                            {history.some(h => new Date(h.timestamp?.toDate()).toDateString() === new Date().toDateString()) ? 'Hadir' : 'Belum Absen'}
                                        </h3>
                                    </div>
                                    <div className="glass-card p-6 rounded-xl">
                                        <p className="text-gray-400 text-sm">Total Kehadiran</p>
                                        <h3 className="text-3xl font-bold mt-2 text-yellow-500">{history.length}</h3>
                                    </div>
                                    <div className="glass-card p-6 rounded-xl">
                                        <p className="text-gray-400 text-sm">Tiket Event Aktif</p>
                                        <h3 className="text-3xl font-bold mt-2 text-yellow-500">{myTickets.filter(t => t.status === 'active').length}</h3>
                                    </div>
                                </div>

                                <div className="glass-panel p-6 rounded-xl">
                                    <h3 className="font-bold text-lg mb-4">Absensi Harian</h3>
                                    <button onClick={handleAttendance} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold transition w-full md:w-auto flex items-center gap-2">
                                        <Icon name="map-pin" /> Lakukan Absensi Sekarang
                                    </button>
                                </div>

                                <div>
                                    <h3 className="font-bold text-lg mb-4">Event Terbaru</h3>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {events.slice(0, 4).map(ev => (
                                            <div key={ev.id} className="glass-card p-4 rounded-lg flex justify-between items-center">
                                                <div>
                                                    <h4 className="font-bold">{ev.title}</h4>
                                                    <p className="text-sm text-gray-400">{new Date(ev.date).toLocaleDateString()}</p>
                                                </div>
                                                <button 
                                                    onClick={() => handleJoinEvent(ev)}
                                                    className="bg-yellow-500 text-black px-3 py-1 rounded text-sm font-bold hover:bg-yellow-400"
                                                >
                                                    Gabung
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        );
                    case 'my_events':
                    return (
                            <div className="space-y-4">
                                {myTickets.length === 0 && <p className="text-gray-400">Belum ada tiket.</p>}
                                {myTickets.map(t => (
                                    <div key={t.id} className="glass-card p-6 rounded-xl flex flex-col md:flex-row gap-6 items-center">
                                        <div className="flex-1">
                                            <h3 className="text-xl font-bold text-yellow-500">{t.eventTitle}</h3>
                                            <p className="text-gray-400">Ticket ID: {t.ticketId}</p>
                                            <span className={`inline-block px-2 py-1 rounded text-xs font-bold mt-2 ${t.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}`}>
                                                {t.status.toUpperCase()}
                                            </span>
                                        </div>
                                        <div className="p-4 bg-white rounded-lg">
                                            <QRCodeDisplay text={t.token} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        );
                    case 'history':
                        return (
                            <div className="glass-panel rounded-xl overflow-hidden">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-white/5 text-gray-400 uppercase text-xs">
                                        <tr>
                                            <th className="px-6 py-4">Waktu</th>
                                            <th className="px-6 py-4">Nama</th>
                                            <th className="px-6 py-4">Kelas</th>
                                            <th className="px-6 py-4">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/10">
                                        {history.map(h => (
                                            <tr key={h.id} className="hover:bg-white/5">
                                                <td className="px-6 py-4">{h.timestamp ? new Date(h.timestamp.toDate()).toLocaleString() : '-'}</td>
                                                <td className="px-6 py-4 font-medium">{h.name}</td>
                                                <td className="px-6 py-4">{h.class}</td>
                                                <td className="px-6 py-4"><span className="bg-green-500/20 text-green-400 px-2 py-1 rounded text-xs">{h.status}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        );
                    case 'profile':
                        return <div>Profile Editor Placeholder (Functional in full version)</div>;
                    default: return null;
                }
            };

            return (
              <div className="flex-1 p-8 animate-fade-in">
                    <h2 className="text-2xl font-bold mb-6">Halo, {userData?.name}</h2>
                    {renderContent()}
                    <Modal isOpen={!!modalData} onClose={() => setModalData(null)} title="Tiket Event Anda">
                        {modalData?.type === 'ticket' && (
                            <div className="text-center space-y-4">
                                <QRCodeDisplay text={modalData.data.token} size={200} />
                                <div>
                                    <p className="text-sm text-gray-400">Token Unik</p>
                                    <p className="font-mono text-xl font-bold tracking-widest text-yellow-500">{modalData.data.token}</p>
                                    <p className="text-gray-300 mt-2 font-bold">{modalData.data.eventTitle}</p>
                                    <p className="text-xs text-gray-500 mt-4">Tunjukkan QR Code ini kepada panitia saat check-in.</p>
                                </div>
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        // --- ADMIN DASHBOARD VIEWS ---

        const AdminDashboard = () => {
            const { userData, logout, showToast } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('overview');
            const [stats, setStats] = useState({ members: 0, attendance: 0, events: 0 });
            const [scanResult, setScanResult] = useState('');

            useEffect(() => {
                const fetchStats = async () => {
                    const mem = await db.collection('users').get();
                    const att = await db.collection('attendance').get();
                    const ev = await db.collection('events').get();
                    setStats({ members: mem.size, attendance: att.size, events: ev.size });
                };
                fetchStats();
            }, [activeTab]); // Refresh on tab change

            const verifyTicket = async () => {
                if(!scanResult) return;
                try {
                    const q = db.collection('tickets').where('token', '==', scanResult).limit(1);
                    const snap = await q.get();
                    
                    if(snap.empty) {
                        showToast("Tiket tidak valid!", "error");
                        return;
                    }

                    const ticket = snap.docs[0];
                  if(ticket.data().status === 'used') {
                        showToast(`Tiket milik ${ticket.data().userName} sudah digunakan.`, "info");
                    } else {
                        await ticket.ref.update({ status: 'used', usedAt: new Date().toISOString() });
                        showToast(`Tiket valid! Selamat datang ${ticket.data().userName}`, "success");
                    }
                    setScanResult('');
                } catch(e) {
                    showToast("Error verifikasi", "error");
                }
            };

            const renderContent = () => {
                switch(activeTab) {
                    case 'overview':
                        return (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="glass-card p-6 rounded-xl border-l-4 border-blue-500">
                                        <p className="text-gray-400 text-sm">Total Member</p>
                                        <h3 className="text-4xl font-bold mt-2">{stats.members}</h3>
                                    </div>
                                    <div className="glass-card p-6 rounded-xl border-l-4 border-green-500">
                                        <p className="text-gray-400 text-sm">Total Kehadiran</p>
                                        <h3 className="text-4xl font-bold mt-2">{stats.attendance}</h3>
                                    </div>
                                    <div className="glass-card p-6 rounded-xl border-l-4 border-purple-500">
                                        <p className="text-gray-400 text-sm">Event Aktif</p>
                                        <h3 className="text-4xl font-bold mt-2">{stats.events}</h3>
                                    </div>
                                </div>
                                {/* Chart placeholders representing Recharts */}
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="glass-panel p-6 rounded-xl h-64 flex items-end justify-between gap-2 pb-10">
                                        {[30, 50, 45, 80, 60, 90, 75].map((h, i) => (
                                            <div key={i} className="w-full bg-yellow-500/20 hover:bg-yellow-500/40 transition rounded-t relative group" style={{height: `${h}%`}}>
                                                <span className="absolute -top-6 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 text-xs text-yellow-500">{h}</span>
                                            </div>
                                        ))}
                                        <p className="absolute bottom-4 w-full text-center text-sm text-gray-500">Statistik Kehadiran Mingguan</p>
                                    </div>
                                    <div className="glass-panel p-6 rounded-xl h-64 flex items-center justify-center">
                                        <div className="w-40 h-40 rounded-full border-[20px] border-yellow-500 border-t-transparent border-l-transparent rotate-45"></div>
                                        <p className="absolute bottom-4 text-sm text-gray-500">Distribusi Divisi</p>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'attendance':
                        return <AttendanceManager />;
                    case 'events':
                        return <EventManager />;
                    case 'members':
                        return <MemberManager />;
                    case 'announcements':
                        return <div className="p-10 text-gray-400">Fitur Pengumuman (Sama strukturnya dengan Event Manager)</div>;
                    default: return null;
                }
            };

            return (
                <div className="flex-1 p-8 animate-fade-in overflow-y-auto h-[calc(100vh-80px)]">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Admin Dashboard</h2>
                        <div className="flex items-center gap-4">
                            <span className="text-sm text-gray-400">Super Admin</span>
                            <div className="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold">A</div>
                        </div>
                    </div>
                    {renderContent()}
                    
                    {/* QR Scanner Overlay (Simulation via Input for single file stability) */}
                    {/* In production, use html5-qrcode library */}
                    {activeTab === 'attendance' && (
                         <div className="fixed bottom-10 right-10 z-50">
                            {/* Placeholder for QR Scanner trigger */}
                         </div>
                    )}
                </div>
            );
        };

        // Sub-components for Admin
        const AttendanceManager = () => {
             const [code, setCode] = useState("");
             const { showToast } = useContext(AppContext);

             const handleScan = async () => {
                 // Logic mimics scanning
                 const q = db.collection('tickets').where('token', '==', code).limit(1);
                 const snap = await q.get();
                 if(!snap.empty) {
                     const t = snap.docs[0];
                     if(t.data().status === 'used') {
                         showToast(`Tiket ${t.data().userName} sudah valid`, "info");
                     } else {
                         await t.ref.update({ status: 'used' });
                         showToast(`Valid: ${t.data().userName} (${t.data().userClass})`, "success");
                     }
                 } else {
                   showToast("Tiket tidak ditemukan", "error");
                 }
                 setCode("");
             }

             return (
                 <div className="space-y-6">
                     <div className="glass-panel p-6 rounded-xl max-w-md mx-auto">
                         <h3 className="font-bold mb-4">Scan Tiket Event</h3>
                         <div className="flex gap-2">
                             <input value={code} onChange={e => setCode(e.target.value)} placeholder="Masukkan Token / Scan" className="flex-1 bg-black/30 border border-white/10 rounded px-4 py-2" />
                             <button onClick={handleScan} className="bg-blue-600 px-4 py-2 rounded font-bold">Check</button>
                         </div>
                     </div>
                     <div className="glass-panel p-6 rounded-xl">
                        <h3 className="font-bold mb-4">Log Absensi Terkini</h3>
                        <div className="text-gray-400 text-sm italic">Data real-time akan muncul disini (Stream listener).</div>
                     </div>
                 </div>
             )
        }

        const EventManager = () => {
            const [events, setEvents] = useState([]);
            const [form, setForm] = useState({ title: '', description: '', date: '', location: '' });
            
            useEffect(() => {
                db.collection('events').onSnapshot(snap => {
                    setEvents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }, []);

            const addEvent = async () => {
                await db.collection('events').add({
                    ...form,
                    date: new Date(form.date).toISOString()
                });
                setForm({ title: '', description: '', date: '', location: '' });
            };

            const deleteEvent = async (id) => {
                await db.collection('events').doc(id).delete();
            };

            return (
                <div className="space-y-6">
                  <div className="glass-panel p-6 rounded-xl">
                        <h3 className="font-bold mb-4">Tambah Event</h3>
                        <div className="grid md:grid-cols-2 gap-4">
                            <input placeholder="Nama Event" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} className="bg-black/30 border border-white/10 rounded px-4 py-2" />
                            <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="bg-black/30 border border-white/10 rounded px-4 py-2" />
                            <input placeholder="Lokasi" value={form.location} onChange={e=>setForm({...form, location: e.target.value})} className="bg-black/30 border border-white/10 rounded px-4 py-2" />
                            <button onClick={addEvent} className="bg-green-600 rounded font-bold hover:bg-green-500">Simpan</button>
                        </div>
                        <textarea placeholder="Deskripsi" value={form.description} onChange={e=>setForm({...form, description: e.target.value})} className="w-full mt-4 bg-black/30 border border-white/10 rounded px-4 py-2 h-24"></textarea>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {events.map(ev => (
                            <div key={ev.id} className="glass-card p-4 rounded-xl relative group">
                                <button onClick={()=>deleteEvent(ev.id)} className="absolute top-2 right-2 text-red-400 opacity-0 group-hover:opacity-100 transition"><Icon name="trash-2" size={16}/></button>
                                <h4 className="font-bold text-lg">{ev.title}</h4>
                                <p className="text-sm text-gray-400">{ev.location}</p>
                                <p className="text-xs text-yellow-500 mt-2">{ev.date ? new Date(ev.date).toLocaleDateString() : '-'}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const MemberManager = () => {
            const [users, setUsers] = useState([]);
            useEffect(() => {
                db.collection('users').onSnapshot(snap => {
                    setUsers(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }, []);

            return (
                 <div className="glass-panel rounded-xl overflow-hidden">
                    <table className="w-full text-left text-sm">
                        <thead className="bg-white/5 text-gray-400 uppercase text-xs">
                            <tr>
                                <th className="px-6 py-4">Nama</th>
                                <th className="px-6 py-4">Kelas</th>
                                <th className="px-6 py-4">Divisi</th>
                                <th className="px-6 py-4">Role</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-white/10">
                            {users.map(u => (
                                <tr key={u.id} className="hover:bg-white/5">
                                    <td className="px-6 py-4 font-medium">{u.name}</td>
                                    <td className="px-6 py-4">{u.class}</td>
                                    <td className="px-6 py-4 text-xs text-gray-400">{u.division}</td>
                                    <td className="px-6 py-4">
                                        <span className={`${u.role === 'admin' ? 'bg-red-500/20 text-red-400' : 'bg-blue-500/20 text-blue-400'} px-2 py-1 rounded text-xs`}>
                                            {u.role}
                                        </span>
                                    </td>
                                  </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        // --- MAIN APP SHELL ---

        const MainApp = () => {
            const { user, userData, loading, view, setView, logout, toast } = useContext(AppContext);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-black">
                        <div className="flex flex-col items-center gap-4">
                            <div className="loader w-12 h-12 border-yellow-500/30 border-l-yellow-500"></div>
                            <p className="text-yellow-500 font-bold tracking-widest animate-pulse">E-OSIS SYSTEM</p>
                        </div>
                    </div>
                );
            }

            // Check specific admin credentials if trying to login as admin
            // Note: In real app, this is handled by Custom Claims. Here we hardcode for the requirement.
            useEffect(() => {
                if (user && user.email === 'smandujuh@gmail.com' && userData?.role !== 'admin') {
                    // Upgrade role on fly for this specific demo email as requested
                    db.collection('users').doc(user.uid).update({ role: 'admin' });
                }
            }, [user]);

            const isAuthPage = view === 'login' || view === 'register';
            const isDashboard = view === 'user_dashboard' || view === 'admin_dashboard';

            return (
                <div className="min-h-screen text-slate-100 font-sans selection:bg-yellow-500/30">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {!isAuthPage && <Navigation />}

                    <main>
                        {view === 'home' && <LandingPage />}
                        {view === 'login' && <AuthPage mode="login" />}
                        {view === 'register' && <AuthPage mode="register" />}
                        
                        {isDashboard && (
                            <div className="pt-24 container mx-auto px-4 flex gap-6">
                                <Sidebar 
                                    role={userData?.role} 
                                    active={view === 'admin_dashboard' ? 'admin' : 'user'} // Simplified for this layout
                                    logout={logout}
                                />
                              {view === 'user_dashboard' && <UserDashboard />}
                                {view === 'admin_dashboard' && <AdminDashboard />}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <MainApp />
            </AppProvider>
        );
    </script>
</body>
</html>
